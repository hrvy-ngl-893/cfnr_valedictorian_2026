<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Congratulations</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --maroon: #7b1113;
            --maroon-dark: #4a0e22;
            --green: #014421;
            --green-dark: #142a1d;
            --gold: #f3aa2c;
            --gold-light: #f2d675;
            --beige: #f7ecd9;
            --beige-dark: #ecdcc0;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'VT323', monospace;
            background: var(--maroon-dark);
        }

        .bezel {
            position: absolute;
            inset: 30px;
            border: 6px solid var(--maroon);
            box-shadow:
                0 0 0 10px var(--gold),
                0 0 0 30px var(--maroon-dark);
            background:
                radial-gradient(circle at 50% 40%, rgba(247, 236, 217, 0.85) 0%, rgba(247, 236, 217, 0) 55%),
                linear-gradient(120deg,
                    var(--beige) 0%,
                    var(--beige-dark) 22%,
                    var(--beige) 45%,
                    var(--beige-dark) 68%,
                    var(--beige) 88%,
                    var(--beige-dark) 100%);
            background-size: 100% 100%, 320% 320%;
            animation: bg-wave 14s ease-in-out infinite;
            overflow: hidden;
        }

        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            padding-top: 6vh;
            z-index: 5;
        }

        .title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(16px, 4vw, 30px);
            color: var(--maroon);
            text-shadow:
                3px 3px 0 var(--gold-light),
                6px 6px 0 var(--green-dark);
            letter-spacing: 2px;
            margin: 0;
        }

        .subtitle {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(16px, 4vw, 30px);
            color: var(--green);
            margin-top: 16px;
        }

        .text {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            line-height: 120%;
            color: var(--green);
            margin: 4vw;
        }

        .name-input {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: var(--beige);
            border: 3px solid var(--maroon);
            color: var(--maroon);
            padding: 8px 10px;
            text-align: center;
            outline: none;
            margin-top: 16px;
            width: 220px;
        }

        .name-input::placeholder {
            color: rgba(123, 30, 58, .45);
        }

        .flower-stage {
            position: absolute;
            left: 50%;
            bottom: calc(10vh + 10px);
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            justify-content: center;
        }

        .flower-wrap {
            position: relative;
            transform-origin: center bottom;
            animation: bob-step var(--bob-duration, 1.8s) infinite steps(1);
            will-change: transform;
        }

        .flower-base,
        .flower-head,
        .flower-glint {
            display: block;
            position: absolute;
            inset: 0;
            image-rendering: pixelated;
        }

        .flower-base {
            z-index: 1;
        }

        .flower-head {
            z-index: 2;
        }

        .flower-glint {
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.16s linear;
        }

        .flower-glint.show {
            opacity: 0.6;
        }

        .ground {
            width: 100%;
            height: 10vh;
            min-height: 26px;
            margin-top: auto;
            background: repeating-linear-gradient(90deg,
                    var(--green) 0 10px,
                    var(--green-dark) 10px 20px);
            image-rendering: pixelated;
            border-top: 6px solid var(--maroon);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold-light);
            pointer-events: none;
            animation: sparkle-blink 1.1s steps(1) forwards;
        }

        @keyframes sparkle-blink {
            0% {
                opacity: 1;
            }

            35% {
                opacity: 1;
            }

            40% {
                opacity: 0;
            }

            55% {
                opacity: 0;
            }

            60% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            85% {
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes bg-wave {
            0% {
                background-position: 50% 50%, 0% 50%;
            }

            25% {
                background-position: 50% 50%, 50% 100%;
            }

            50% {
                background-position: 50% 50%, 100% 50%;
            }

            75% {
                background-position: 50% 50%, 50% 0%;
            }

            100% {
                background-position: 50% 50%, 0% 50%;
            }
        }

        @keyframes bob-step {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(calc(-1 * var(--bob-height, 7px)));
            }
        }
    </style>

    <link rel="icon" type="image/x-icon" href="favicon.ico">

</head>

<body>
    <div class="bezel">
        <div class="stage">

            <div class="header">
                <h1 class="title">CONGRATULATIONS</h1>
                <p class="subtitle" id="subtitleText">Academic Nuclear Warhead</p>
                <p class="text">You did na incredible job! Class Valedictorian and Magna Cum Laude. Cheers to you and your work. May a greater force guide you and protect you, as you are surrounded by people who love you. Keep your head held high and your feet on the ground!</p>
            </div>

            <div class="flower-stage" id="flowerStage"></div>
            <div class="ground"></div>

        </div>
    </div>
    <script>
        const CONFIG = {
            pixelSize: 9,
            headCells: 17,
            numPetals: 12,
            centerRatio: 0.22,
            stemRows: 14,
            bobHeightPx: 0,
            bobDurationS: 1.8,
            bloomDurationS: 0.85,
            // Negative value sinks the plant's base into the ground texture so it
            // reads as rooted/planted rather than floating above the dirt line.
            rootInsetPx: -18,
            plantOffsetX: 0,
            plantOffsetY: 0,
            glintEveryMs: [180, 260],
            sparkleEveryMs: 600,
            glintOpacity: 0.55,
            // How far (0-1, normalized to the head's max span) each glint step
            // advances the radial sunlight sweep, and how wide the lit ring is.
            glintStep: 0.1,
            glintBandWidth: 0.16
        };

        function buildHeadGrid(size, numPetals, centerRatio, progress = 1) {
            const grid = [];
            const c = size / 2;
            const centerR = size * centerRatio * (0.6 + 0.4 * progress);
            const petalOuterMax = size * 0.48;
            const petalInner = size * 0.20;

            for (let y = 0; y < size; y++) {
                const row = [];
                for (let x = 0; x < size; x++) {
                    const dx = x - c + 0.5;
                    const dy = y - c + 0.5;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    const petalMod = Math.abs(Math.cos(angle * numPetals / 2));
                    const outerAtAngle = petalInner + (petalOuterMax - petalInner) * petalMod;
                    const revealRadius = centerR + (outerAtAngle - centerR) * progress;

                    if (dist <= centerR) {
                        row.push((x + y) % 2 === 0 ? 'C1' : 'C2');
                    } else if (dist <= revealRadius) {
                        row.push(dist > revealRadius - size * 0.09 ? 'P1' : 'P2');
                    } else {
                        row.push('.');
                    }
                }
                grid.push(row);
            }
            return grid;
        }

        const HEAD_COLORS = {
            C1: getVar('--maroon'),
            C2: getVar('--maroon-dark'),
            P1: getVar('--gold-light'),
            P2: getVar('--gold'),
        };

        function getVar(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        // Manual plant placement lives here if you want to tweak the stem/head position.
        function drawStem(canvas, cfg, progress) {
            const size = cfg.headCells;
            const px = cfg.pixelSize;
            const totalRows = size + cfg.stemRows;
            const paddingX = Math.floor(px * 2.2);
            const drawWidth = size * px + paddingX * 2;
            const offsetX = paddingX + cfg.plantOffsetX;
            const offsetY = cfg.plantOffsetY;
            canvas.width = drawWidth;
            canvas.height = totalRows * px + Math.abs(offsetY);
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const stemReveal = Math.min(1, progress / 0.6);
            const stemColStart = Math.floor(size / 2) - 1;
            const visibleStemRows = Math.max(1, Math.floor(cfg.stemRows * stemReveal));
            ctx.fillStyle = getVar('--green');
            for (let i = 0; i < visibleStemRows; i++) {
                const y = totalRows - 1 - i;
                const wobble = i % 2 === 0 ? 0 : 1;
                const stemWidth = i === 0 ? 2 : 3;
                ctx.fillRect((stemColStart + wobble) * px + offsetX, y * px + offsetY, stemWidth * px, px);
            }

            ctx.fillStyle = getVar('--green-dark');
            for (let i = 0; i < visibleStemRows; i++) {
                if (i % 3 === 0) {
                    const y = totalRows - 1 - i;
                    ctx.fillRect((stemColStart + 2) * px + offsetX, y * px + offsetY, px, px);
                }
            }

            if (stemReveal > 0.2) {
                const leafColor = getVar('--green');
                const leafProgress = Math.min(1, (progress - 0.2) / 0.6);
                const leafLength = Math.max(2, Math.floor(leafProgress * 4));
                ctx.fillStyle = leafColor;
                for (let row = 0; row < leafLength; row++) {
                    const width = Math.max(2, 4 - row);
                    const y1 = totalRows - 2 - Math.floor(cfg.stemRows * 0.18) - row * 2;
                    const y2 = totalRows - 3 - Math.floor(cfg.stemRows * 0.38) - row * 2;
                    ctx.fillRect((stemColStart - 4 + row) * px + offsetX, y1 * px + offsetY, width * px, 2 * px);
                    ctx.fillRect((stemColStart + 4 - row) * px + offsetX, y2 * px + offsetY, width * px, 2 * px);
                }

                ctx.fillStyle = getVar('--green-dark');
                ctx.fillRect((stemColStart - 3) * px + offsetX, (totalRows - 2 - Math.floor(cfg.stemRows * 0.18)) * px + offsetY, px, px);
                ctx.fillRect((stemColStart + 3) * px + offsetX, (totalRows - 3 - Math.floor(cfg.stemRows * 0.38)) * px + offsetY, px, px);
            }

            // Neck fill: the head is a round, petaled shape, so at low angles
            // its bottom edge only reaches the stem column in a few narrow
            // spots (petal tips), which reads as the head floating above the
            // stem. Fill a solid green column up under the head's center so
            // there's always stem-colored mass behind it — hidden wherever
            // the head is opaque, visible wherever the petals gap, which
            // bridges the two into one continuous plant.
            if (stemReveal >= 1) {
                const neckTopRow = Math.floor(size * 0.4);
                ctx.fillStyle = getVar('--green');
                for (let y = neckTopRow; y < size; y++) {
                    const wobble = y % 2 === 0 ? 0 : 1;
                    ctx.fillRect((stemColStart + wobble) * px + offsetX, y * px + offsetY, 3 * px, px);
                }
                ctx.fillStyle = getVar('--green-dark');
                for (let y = neckTopRow; y < size; y++) {
                    if (y % 3 === 0) {
                        ctx.fillRect((stemColStart + 2) * px + offsetX, y * px + offsetY, px, px);
                    }
                }
            }

            // Root flare: once the stem is fully grown, widen its base so the
            // plant reads as anchored/spreading into the soil rather than
            // ending in a bare stalk. This sits at the very bottom of the
            // canvas, which is where the negative rootInsetPx sinks the plant
            // into the ground texture.
            if (stemReveal >= 1) {
                const baseY = totalRows - 1;
                ctx.fillStyle = getVar('--green-dark');
                ctx.fillRect((stemColStart - 1) * px + offsetX, baseY * px + offsetY, 5 * px, px);
                ctx.fillStyle = getVar('--green');
                ctx.fillRect((stemColStart - 2) * px + offsetX, (baseY - 1) * px + offsetY, 1 * px, px);
                ctx.fillRect((stemColStart + 4) * px + offsetX, (baseY - 1) * px + offsetY, 1 * px, px);
            }
        }

        function drawHead(canvas, cfg, progress) {
            const size = cfg.headCells;
            const px = cfg.pixelSize;
            const totalRows = size + cfg.stemRows;
            const paddingX = Math.floor(px * 2.2);
            const drawWidth = size * px + paddingX * 2;
            const offsetX = paddingX + cfg.plantOffsetX;
            const offsetY = cfg.plantOffsetY;
            canvas.width = drawWidth;
            canvas.height = totalRows * px + Math.abs(offsetY);
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const headReveal = Math.max(0, (progress - 0.6) / 0.4);
            if (headReveal <= 0) return;

            const grid = buildHeadGrid(size, cfg.numPetals, cfg.centerRatio, headReveal);
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const key = grid[y][x];
                    if (key === '.') continue;
                    ctx.fillStyle = HEAD_COLORS[key];
                    ctx.fillRect(x * px + offsetX, y * px + offsetY, px, px);
                }
            }
        }

        // Radial glint sweep: simulates a low, bottom-left light source washing
        // outward across the flower head in rings, instead of random twinkles.
        let glintWave = 0;

        function pickGlintPixels(size, cfg, progress, wavePos) {
            const grid = buildHeadGrid(size, cfg.numPetals, cfg.centerRatio, Math.max(0, (progress - 0.6) / 0.4));
            const flowerPixels = [];
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    if (grid[y][x] !== '.') {
                        flowerPixels.push({ x, y });
                    }
                }
            }
            if (flowerPixels.length === 0) return [];

            // Light source sits outside the grid, past the bottom-left corner,
            // so distance-from-source rings sweep diagonally across the head.
            const sx = -size * 0.35;
            const sy = size * 1.35;
            let maxDist = 0;
            for (const p of flowerPixels) {
                const d = Math.hypot(p.x - sx, p.y - sy);
                if (d > maxDist) maxDist = d;
            }
            if (maxDist === 0) return [];

            const half = cfg.glintBandWidth / 2;
            const glintPixels = [];
            for (const p of flowerPixels) {
                const dNorm = Math.hypot(p.x - sx, p.y - sy) / maxDist;
                if (Math.abs(dNorm - wavePos) <= half) {
                    glintPixels.push(p);
                }
            }
            return glintPixels;
        }

        let currentGlintPixels = [];

        function drawGlint(canvas, cfg, progress) {
            const size = cfg.headCells;
            const px = cfg.pixelSize;
            const totalRows = size + cfg.stemRows;
            const paddingX = Math.floor(px * 2.2);
            const drawWidth = size * px + paddingX * 2;
            const offsetX = paddingX + cfg.plantOffsetX;
            const offsetY = cfg.plantOffsetY;
            canvas.width = drawWidth;
            canvas.height = totalRows * px + Math.abs(offsetY);
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (progress < 0.65 || currentGlintPixels.length === 0) return;

            ctx.fillStyle = `rgba(255, 255, 255, ${cfg.glintOpacity})`;
            for (const pixel of currentGlintPixels) {
                ctx.fillRect(pixel.x * px + offsetX, pixel.y * px + offsetY, px, px);
            }
        }

        const flowerStage = document.getElementById('flowerStage');
        document.documentElement.style.setProperty('--bob-height', CONFIG.bobHeightPx + 'px');
        document.documentElement.style.setProperty('--bob-duration', CONFIG.bobDurationS + 's');

        const wrap = document.createElement('div');
        wrap.className = 'flower-wrap';

        const stemCanvas = document.createElement('canvas');
        stemCanvas.className = 'flower-base';

        const headCanvas = document.createElement('canvas');
        headCanvas.className = 'flower-head';

        const glintCanvas = document.createElement('canvas');
        glintCanvas.className = 'flower-glint';

        wrap.appendChild(stemCanvas);
        wrap.appendChild(headCanvas);
        wrap.appendChild(glintCanvas);
        flowerStage.appendChild(wrap);
        const plantWidth = (CONFIG.headCells * CONFIG.pixelSize) + (Math.floor(CONFIG.pixelSize * 2.2) * 2);
        const plantHeight = ((CONFIG.headCells + CONFIG.stemRows) * CONFIG.pixelSize);
        flowerStage.style.width = plantWidth + 'px';
        flowerStage.style.height = plantHeight + 'px';
        flowerStage.style.bottom = `calc(10vh + ${CONFIG.rootInsetPx}px)`;
        wrap.style.width = plantWidth + 'px';
        wrap.style.height = plantHeight + 'px';

        let bloomStart = null;
        function renderFlower(now) {
            if (!bloomStart) bloomStart = now;
            const progress = Math.min(1, (now - bloomStart) / (CONFIG.bloomDurationS * 1000));
            drawStem(stemCanvas, CONFIG, progress);
            drawHead(headCanvas, CONFIG, progress);
            drawGlint(glintCanvas, CONFIG, progress);
            requestAnimationFrame(renderFlower);
        }
        requestAnimationFrame(renderFlower);

        function scheduleGlint() {
            const [min, max] = CONFIG.glintEveryMs;
            const delay = min + Math.random() * (max - min);
            setTimeout(() => {
                currentGlintPixels = pickGlintPixels(CONFIG.headCells, CONFIG, 1, glintWave);
                glintCanvas.classList.add('show');
                setTimeout(() => glintCanvas.classList.remove('show'), 180);
                glintWave += CONFIG.glintStep;
                if (glintWave > 1 + CONFIG.glintBandWidth) glintWave = 0;
                scheduleGlint();
            }, delay);
        }
        scheduleGlint();

        function spawnSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const headWidth = CONFIG.headCells * CONFIG.pixelSize;
            const headHeight = CONFIG.headCells * CONFIG.pixelSize;
            s.style.left = (Math.random() * headWidth) + 'px';
            s.style.top = (Math.random() * headHeight) + 'px';
            wrap.appendChild(s);
            setTimeout(() => s.remove(), 1150);
        }
        setInterval(spawnSparkle, CONFIG.sparkleEveryMs);


    </script>
</body>

</html>
